worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  # ── Upstream: 3 Node.js instances (horizontal scale)
  # All three receive WebSocket connections; Redis Pub/Sub
  # ensures presence events are fanned out to every instance.
  upstream collabflow_api {
    least_conn;                        # route to instance with fewest active conns
    server api_1:3001;
    server api_2:3001;
    server api_3:3001;
    keepalive 64;                      # reuse upstream TCP connections
  }

  # ── Logging
  log_format main '$remote_addr - $request_time s '
                  '"$request" $status $body_bytes_sent '
                  '"$http_upgrade"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Perf
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  server_tokens   off;

  # Tune for long-lived WebSocket connections
  keepalive_timeout          75s;
  keepalive_requests         1000;

  # ── WebSocket upgrade map
  # If the client sends "Upgrade: websocket", set Connection: upgrade;
  # otherwise fall back to "close" so HTTP/1.1 keepalive still works.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
  }

  # ── Gzip (REST responses only — never compress WebSocket frames)
  gzip on;
  gzip_types application/json text/plain text/css application/javascript;
  gzip_min_length 1024;
  gzip_vary on;

  # ── Rate limiting
  # Protect against connection floods. 10 r/s per IP on REST;
  # WebSocket handshakes share the same zone but burst is handled
  # via the separate connection limit below.
  limit_req_zone  $binary_remote_addr zone=api_limit:10m rate=10r/s;
  limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name collabflow.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # ───────────────────────────────────────────────────
    # WebSocket endpoint — Yjs CRDT sync + presence
    # ───────────────────────────────────────────────────
    # The Yjs WebSocketProvider on the client connects here.
    # nginx upgrades the HTTP request to a WebSocket tunnel
    # and proxies it to one of the three Node instances.
    # Redis Pub/Sub on the server side ensures a cursor
    # broadcast from instance A reaches clients on B and C.
    location /ws/ {
      proxy_pass http://collabflow_api;
      proxy_http_version 1.1;

      # Required WebSocket upgrade headers
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # Forward real client IP for per-user presence tracking
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Host            $host;

      # Timeouts — must be >> heartbeat interval (30 s).
      # read_timeout governs silence between WS frames;
      # set it high enough that idle clients aren't dropped.
      proxy_read_timeout    3600s;   # 1-hour max idle
      proxy_send_timeout    3600s;
      proxy_connect_timeout 10s;

      # Prevent nginx from buffering WS frames in memory
      proxy_buffering off;

      # Max 500 simultaneous WS connections per IP
      limit_conn ws_conn 500;
    }

    # ───────────────────────────────────────────────────
    # REST API
    # ───────────────────────────────────────────────────
    location /api/ {
      proxy_pass http://collabflow_api;
      proxy_http_version 1.1;

      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";  # strip hop-by-hop for HTTP/1.1 keepalive

      # Enforce read timeout on REST (not as generous as WS)
      proxy_read_timeout    30s;
      proxy_connect_timeout 5s;

      # Rate limit: 10 r/s, burst 20
      limit_req zone=api_limit burst=20 nodelay;

      # Allow large document payloads (Yjs state vectors can be big)
      client_max_body_size 10m;
    }

    # ───────────────────────────────────────────────────
    # Next.js frontend (static assets + SSR)
    # ───────────────────────────────────────────────────
    location / {
      proxy_pass http://web:3000;
      proxy_http_version 1.1;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";

      proxy_read_timeout 30s;

      # Cache static assets aggressively; Next.js content-hashes filenames
      location ~* \.(js|css|woff2|png|svg|ico)$ {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
      }
    }




    # ── Health check (used by k8s liveness probe)
    location /health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
}